kind = "web"
previewPath = "/"
title = "Geosavers International"
version = "1.0.0"
id = "artifacts/geosavers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20649

[services.development]
run = "pnpm --filter @workspace/geosavers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/geosavers", "run", "build" ]
publicDir = "artifacts/geosavers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20649"
BASE_PATH = "/"
